<div class="page-header" style="padding-bottom:20px;">
  <span class="eyebrow">/contact</span>
  <h1>Request Access</h1>
  <p class="lede">Tell us a bit about your team and what you're looking to review. We'll follow up shortly.</p>
</div>

<div class="contact-frame">
  <form class="contact-card" action="mailto:hello@greyqub.com" method="post" enctype="text/plain">
    <div>
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>
    </div>
    <div>
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
    </div>
    <div>
      <label for="org">Organization</label>
      <input type="text" id="org" name="org">
    </div>
    <div>
      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="What are you looking to review — NDAs, syndicated loan agreements?"></textarea>
    </div>
    <button class="btn-cta" type="submit">Send</button>
  </form>

  <div class="contact-direct">
    <span class="eyebrow">Prefer email</span>
    <a href="mailto:hello@greyqub.com">hello@greyqub.com</a>
  </div>
</div>
