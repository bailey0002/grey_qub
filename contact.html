<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f1ede6" id="themeColorMeta">
<script>
(function(){
  try{
    var stored = localStorage.getItem('gq-theme');
    var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
    document.getElementById('themeColorMeta').setAttribute('content', theme === 'dark' ? '#1b1917' : '#f1ede6');
  }catch(e){}
})();
</script>
<title>Contact — Grey Qub</title>
<meta name="description" content="Get in touch with Grey Qub.">

</head>
<body>
<div class="grain"></div>
<div class="topline"></div>

<nav>
  <a class="navmark" href="index.html">
    <div class="wordwrap">
      <div class="word">GREY QUB</div>
      <div class="wordline" aria-hidden="true"></div>
    </div>
  </a>
  <div class="nav-right">
    <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark theme" aria-pressed="false">
      <span class="theme-label" id="themeLabel">Light</span>
      <span class="track"><span class="knob"></span></span>
    </button>
    <div class="navmenu-wrap">
      <button class="bars" type="button" aria-label="Toggle menu"><span></span><span></span><span></span></button>
      <div class="navmenu">
        <a href="index.html#blochs">/blochs</a>
        <a href="bloch-slr.html">/axis</a>

      </div>
    </div>
  </div>
</nav>

<div class="page-header" style="padding-bottom:20px;">
  <span class="eyebrow">/contact</span>
  <h1>Request Access</h1>
  <p class="lede">Tell us a bit about your team and what you're looking to review. We'll follow up shortly.</p>
</div>

<div class="contact-frame">
  <form class="contact-card" action="mailto:hello@greyqub.com" method="post" enctype="text/plain">
    <div>
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>
    </div>
    <div>
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
    </div>
    <div>
      <label for="org">Organization</label>
      <input type="text" id="org" name="org">
    </div>
    <div>
      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="What are you looking to review — NDAs, syndicated loan agreements?"></textarea>
    </div>
    <button class="btn-cta" type="submit">Send</button>
  </form>

  <div class="contact-direct">
    <span class="eyebrow">Prefer email</span>
    <a href="mailto:hello@greyqub.com">hello@greyqub.com</a>
  </div>
</div>

<footer>
  <div class="foot-inner">
    <p>Grey Qub — automated document intelligence for legal and financial professionals.</p>
    <div class="foot-links">
      <a href="index.html#blochs">/blochs</a>
